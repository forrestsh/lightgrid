const NB=[];for(const a of[-1,1])for(const b of[-1,1]){NB.push([a,b,0]);NB.push([a,0,b]);NB.push([0,a,b]);}
const VERT=[];for(const x of[-1,1])VERT.push([x,0,0]);for(const y of[-1,1])VERT.push([0,y,0]);
for(const z of[-1,1])VERT.push([0,0,z]);
for(const x of[-1,1])for(const y of[-1,1])for(const z of[-1,1])VERT.push([x*.5,y*.5,z*.5]);
function orderFace(vs,n){const c=[0,0,0];vs.forEach(v=>{c[0]+=v[0];c[1]+=v[1];c[2]+=v[2]});c.forEach((_,i)=>c[i]/=vs.length);
 const u0=[vs[0][0]-c[0],vs[0][1]-c[1],vs[0][2]-c[2]],ul=Math.hypot(...u0),u=u0.map(t=>t/ul);
 const w0=[n[1]*u[2]-n[2]*u[1],n[2]*u[0]-n[0]*u[2],n[0]*u[1]-n[1]*u[0]],wl=Math.hypot(...w0),w=w0.map(t=>t/wl);
 return vs.map(v=>{const d=[v[0]-c[0],v[1]-c[1],v[2]-c[2]];
  return{v,a:Math.atan2(d[0]*w[0]+d[1]*w[1]+d[2]*w[2],d[0]*u[0]+d[1]*u[1]+d[2]*u[2])}}).sort((p,q)=>p.a-q.a).map(o=>o.v)}
const FACES=NB.map(n=>({n,q:orderFace(VERT.filter(v=>Math.abs(v[0]*n[0]+v[1]*n[1]+v[2]*n[2]-1)<1e-9),n)}));
function hsl(h){const s=.5,l=.62,c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;let r,g,b;
 if(h<60)[r,g,b]=[c,x,0];else if(h<120)[r,g,b]=[x,c,0];else if(h<180)[r,g,b]=[0,c,x];
 else if(h<240)[r,g,b]=[0,x,c];else if(h<300)[r,g,b]=[x,0,c];else[r,g,b]=[c,0,x];return[r+m,g+m,b+m]}
function hex2rgb(h){return[parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255]}
function rgb2hex(r){const f=v=>('0'+Math.round(Math.max(0,Math.min(1,v))*255).toString(16)).slice(-2);return'#'+f(r[0])+f(r[1])+f(r[2])}

const names=Object.keys(PARTS);
const partCells=names.map(nm=>{const c=PARTS[nm].c,a=[];for(let i=0;i<c.length;i+=3)a.push([c[i],c[i+1],c[i+2]]);return a});
const partHue=names.map((_,i)=>hsl((i*47)%360));
const partOffset=names.map(()=>[0,0,0]);
let gc=[0,0,0],tot=0;partCells.forEach(cs=>cs.forEach(c=>{gc[0]+=c[0];gc[1]+=c[1];gc[2]+=c[2];tot++}));gc=gc.map(v=>v/tot);
const glo=[1e9,1e9,1e9],ghi=[-1e9,-1e9,-1e9];
partCells.forEach(cs=>cs.forEach(c=>{for(let d=0;d<3;d++){glo[d]=Math.min(glo[d],c[d]);ghi[d]=Math.max(ghi[d],c[d])}}));
const radius=0.5*Math.hypot(ghi[0]-glo[0],ghi[1]-glo[1],ghi[2]-glo[2]);

// three
const stage=document.getElementById('stage');
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));stage.appendChild(renderer.domElement);
const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(42,1,0.1,1e5);
scene.add(new THREE.AmbientLight(0xaab6cc,.85));
const kl=new THREE.DirectionalLight(0xfff2df,1.05);kl.position.set(.6,1,.75);scene.add(kl);
const fl=new THREE.DirectionalLight(0x9fb6ff,.55);fl.position.set(-.6,.35,-.5);scene.add(fl);
const ul=new THREE.DirectionalLight(0x6677aa,.3);ul.position.set(0,-1,.2);scene.add(ul);
const mat=new THREE.MeshStandardMaterial({vertexColors:true,flatShading:true,roughness:.5,metalness:0,side:THREE.DoubleSide});

let mesh,basePos,positions,colors,nFaces=0;
let facePart,faceCellL,partFaceStart=[],partFaceCount=[],partVertStart=[],partVertCount=[],cellFacesByPart;
let baseMode='hue';

function build(){
 const pos=[],col=[];facePart=[];faceCellL=[];cellFacesByPart=names.map(()=>({}));
 let fb=0;
 for(let pi=0;pi<names.length;pi++){partFaceStart[pi]=fb;partVertStart[pi]=pos.length/3;
  const cs=partCells[pi];const occ=new Set(cs.map(k=>k[0]+','+k[1]+','+k[2]));const hue=partHue[pi];
  for(let ci=0;ci<cs.length;ci++){const c=cs[ci];
   for(const F of FACES){const n=F.n;
    if(occ.has((c[0]+n[0])+','+(c[1]+n[1])+','+(c[2]+n[2])))continue;
    facePart[fb]=pi;faceCellL[fb]=ci;(cellFacesByPart[pi][ci]||(cellFacesByPart[pi][ci]=[])).push(fb);
    const q=F.q,b=[c[0]-gc[0],c[1]-gc[1],c[2]-gc[2]];
    for(const t of[[q[0],q[1],q[2]],[q[0],q[2],q[3]]])for(const v of t){
     pos.push(b[0]+v[0],b[1]+v[1],b[2]+v[2]);col.push(hue[0],hue[1],hue[2])}
    fb++}}
  partFaceCount[pi]=fb-partFaceStart[pi];partVertCount[pi]=pos.length/3-partVertStart[pi]}
 nFaces=fb;basePos=Float32Array.from(pos);positions=Float32Array.from(pos);colors=Float32Array.from(col);
 const g=new THREE.BufferGeometry();
 g.setAttribute('position',new THREE.BufferAttribute(positions,3));
 g.setAttribute('color',new THREE.BufferAttribute(colors,3));g.computeVertexNormals();
 mesh=new THREE.Mesh(g,mat);scene.add(mesh);
 document.getElementById('np').textContent=names.length;document.getElementById('fc').textContent=nFaces;
 applyBase()}
function faceBaseColor(fb){return baseMode==='hue'?partHue[facePart[fb]]:BASEPLAIN}
function applyBase(){for(let fb=0;fb<nFaces;fb++){if(paintedMap[fb])continue;const rgb=faceBaseColor(fb);
  for(let v=0;v<6;v++){colors[(fb*6+v)*3]=rgb[0];colors[(fb*6+v)*3+1]=rgb[1];colors[(fb*6+v)*3+2]=rgb[2]}}
 mesh.geometry.attributes.color.needsUpdate=true}

const paintedMap={};  // fb -> hex (only painted faces)
function setFace(fb,rgb){for(let v=0;v<6;v++){colors[(fb*6+v)*3]=rgb[0];colors[(fb*6+v)*3+1]=rgb[1];colors[(fb*6+v)*3+2]=rgb[2]}}
function getFace(fb){return[colors[fb*6*3],colors[fb*6*3+1],colors[fb*6*3+2]]}
function paintedCount(){return Object.keys(paintedMap).length}
function updateCount(){document.getElementById('pc').textContent=paintedCount()}

// positions update (move)
function refreshPartPos(pi){const o=partOffset[pi],s=partVertStart[pi],n=partVertCount[pi];
 for(let i=0;i<n;i++){const vi=(s+i)*3;positions[vi]=basePos[vi]+o[0];positions[vi+1]=basePos[vi+1]+o[1];positions[vi+2]=basePos[vi+2]+o[2]}
 mesh.geometry.attributes.position.needsUpdate=true}
function snapLattice(v){const r=v.map(Math.round);let s=r[0]+r[1]+r[2];
 if(((s%2)+2)%2===1){let ax=0,best=-1;for(let d=0;d<3;d++){const fr=Math.abs(v[d]-r[d]);if(fr>best){best=fr;ax=d}}
  r[ax]+=(v[ax]-r[ax])>=0?1:-1}return r}

// paint w/ undo + persistence
let curColor=hex2rgb(SWATCHES[0]),tool='face',modeP='paint',stroke=null,undoStack=[];
function beginStroke(){stroke={}}
function rec(fb){if(stroke&&!(fb in stroke))stroke[fb]=paintedMap[fb]||('base:'+rgb2hex(faceBaseColor(fb)))}
function endStroke(){if(stroke&&Object.keys(stroke).length){undoStack.push(stroke);if(undoStack.length>40)undoStack.shift();
  savePaint();updateCount()}stroke=null}
function paintFace(fb){rec(fb);
 if(tool==='erase'){delete paintedMap[fb];setFace(fb,faceBaseColor(fb))}
 else{const hx=rgb2hex(curColor);paintedMap[fb]=hx;setFace(fb,curColor)}
 mesh.geometry.attributes.color.needsUpdate=true}
function paintCell(fb){for(const g of cellFacesByPart[facePart[fb]][faceCellL[fb]])paintFace(g)}
function paintPart(fb){const pi=facePart[fb];for(let g=partFaceStart[pi];g<partFaceStart[pi]+partFaceCount[pi];g++)paintFace(g)}
function undo(){const s=undoStack.pop();if(!s)return;
 for(const k in s){const fb=+k,val=s[k];
  if(typeof val==='string'&&val.startsWith('base:')){delete paintedMap[fb];setFace(fb,faceBaseColor(fb))}
  else{paintedMap[fb]=val;setFace(fb,hex2rgb(val))}}
 mesh.geometry.attributes.color.needsUpdate=true;savePaint();updateCount()}

async function savePaint(){try{await window.storage.set('carlivery',JSON.stringify(paintedMap),false)}catch(e){}}
async function loadPaint(){try{const r=await window.storage.get('carlivery',false);
 if(r&&r.value){const o=JSON.parse(r.value);for(const k in o){const fb=+k;if(fb<nFaces){paintedMap[fb]=o[k];setFace(fb,hex2rgb(o[k]))}}
  mesh.geometry.attributes.color.needsUpdate=true;updateCount()}}catch(e){}}
async function saveLayout(){try{await window.storage.set('carlayout',JSON.stringify(partOffset),false)}catch(e){}}
async function loadLayout(){try{const r=await window.storage.get('carlayout',false);
 if(r&&r.value){const o=JSON.parse(r.value);if(Array.isArray(o)&&o.length===names.length){
  for(let i=0;i<o.length;i++){partOffset[i]=o[i];refreshPartPos(i)}}}}catch(e){}}

// camera + interaction
let yaw=0.9,pitch=0.5,dist=1,fitDist=10,autoSpin=true;const target=new THREE.Vector3();
function updateFit(){const vf=camera.fov*Math.PI/180,hf=2*Math.atan(Math.tan(vf/2)*Math.max(camera.aspect,.001));
 fitDist=radius/Math.sin(Math.min(vf,hf)/2)*1.12+2}
function applyCam(){const r=fitDist*dist;
 camera.position.set(r*Math.cos(pitch)*Math.sin(yaw),r*Math.sin(pitch),r*Math.cos(pitch)*Math.cos(yaw));camera.lookAt(target)}
function setDist(d){dist=Math.max(0.25,Math.min(3,d))}
const cv=renderer.domElement,ptrs=new Map(),ray=new THREE.Raycaster();
let lx=0,ly=0,pd=0,painting=false,dragPart=-1,dSX=0,dSY=0,dStart=null;
function pick(e){const rc=cv.getBoundingClientRect();
 const ndc=new THREE.Vector2(((e.clientX-rc.left)/rc.width)*2-1,-((e.clientY-rc.top)/rc.height)*2+1);
 ray.setFromCamera(ndc,camera);const hit=ray.intersectObject(mesh);
 return(hit.length&&hit[0].faceIndex!=null)?Math.floor(hit[0].faceIndex/2):-1}
function actAt(e){const fb=pick(e);if(fb<0)return;
 if(tool==='pick'){curColor=getFace(fb);syncColorUI();return}
 if(tool==='part'){paintPart(fb);return}
 if(tool==='cell'){paintCell(fb);return}
 paintFace(fb)}
function selMsg(pi){selectedPart=pi;document.getElementById('selName').textContent=pi>=0?tr('selectedPart')(names[pi]):''}
function pdist(){const a=[...ptrs.values()];return Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y)}
cv.addEventListener('pointerdown',e=>{cv.setPointerCapture&&cv.setPointerCapture(e.pointerId);
 if(ptrs.size===0){const fb=pick(e);
  if(fb>=0){autoSpin=false;
   if(modeP==='move'){dragPart=facePart[fb];selMsg(dragPart);dSX=e.clientX;dSY=e.clientY;dStart=[...partOffset[dragPart]];return}
   if(tool==='pick'||tool==='part'){actAt(e);return}
   beginStroke();painting=true;actAt(e);return}}
 ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});autoSpin=false;lx=e.clientX;ly=e.clientY;if(ptrs.size===2){painting=false;pd=pdist()}});
cv.addEventListener('pointermove',e=>{
 if(dragPart>=0){const rc=cv.getBoundingClientRect();const cd=camera.position.distanceTo(target);
  const wpp=2*Math.tan(camera.fov*Math.PI/360)*cd/rc.height;
  const right=new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld,0);
  const up=new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld,1);
  const dx=(e.clientX-dSX)*wpp,dy=(e.clientY-dSY)*wpp;
  partOffset[dragPart]=[dStart[0]+right.x*dx-up.x*dy,dStart[1]+right.y*dx-up.y*dy,dStart[2]+right.z*dx-up.z*dy];
  refreshPartPos(dragPart);return}
 if(painting){actAt(e);return}
 if(!ptrs.has(e.pointerId))return;ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
 if(ptrs.size===1){yaw-=(e.clientX-lx)*.008;pitch+=(e.clientY-ly)*.008;pitch=Math.max(-1.4,Math.min(1.4,pitch));lx=e.clientX;ly=e.clientY}
 else if(ptrs.size===2){const d=pdist();if(pd>0)setDist(dist*pd/d);pd=d}});
function endPtr(e){
 if(dragPart>=0){partOffset[dragPart]=snapLattice(partOffset[dragPart]);refreshPartPos(dragPart);saveLayout();dragPart=-1;return}
 if(painting){painting=false;endStroke();return}
 ptrs.delete(e.pointerId);if(ptrs.size<2)pd=0;const a=[...ptrs.values()][0];if(a){lx=a.x;ly=a.y}}
cv.addEventListener('pointerup',endPtr);cv.addEventListener('pointercancel',endPtr);
cv.addEventListener('wheel',e=>{e.preventDefault();setDist(dist*(1+Math.sign(e.deltaY)*.09))},{passive:false});
document.getElementById('zin').onclick=()=>setDist(dist*.84);
document.getElementById('zout').onclick=()=>setDist(dist*1.19);
document.getElementById('zfit').onclick=()=>{dist=1;yaw=0.9;pitch=0.5};

// UI
const pal=document.getElementById('palette');let swBtns=[];
SWATCHES.forEach((h,i)=>{const b=document.createElement('button');b.className='sw'+(i===0?' on':'');b.style.background=h;
 b.onclick=()=>{curColor=hex2rgb(h);setActiveSwatch(b);cpick.value=h};pal.appendChild(b);swBtns.push(b)});
const cpick=document.createElement('input');cpick.type='color';cpick.value=SWATCHES[0];
cpick.setAttribute('aria-label',tr('color'));
cpick.oninput=()=>{curColor=hex2rgb(cpick.value);setActiveSwatch(null)};pal.appendChild(cpick);
function setActiveSwatch(b){swBtns.forEach(x=>x.classList.remove('on'));if(b)b.classList.add('on')}
function syncColorUI(){const h=rgb2hex(curColor);cpick.value=h;let m=null;swBtns.forEach((b,i)=>{if(SWATCHES[i].toLowerCase()===h)m=b});setActiveSwatch(m)}
document.getElementById('mode').onclick=e=>{const b=e.target.closest('button');if(!b)return;
 [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');modeP=b.dataset.m;
 document.getElementById('hint').textContent=modeP==='move'?tr('moveHint'):tr('paintHint');
 if(modeP==='paint')selMsg(-1)};
document.getElementById('tool').onclick=e=>{const b=e.target.closest('button');if(!b)return;
 [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');tool=b.dataset.t};
document.getElementById('baseSeg').onclick=e=>{const b=e.target.closest('button');if(!b)return;
 [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');baseMode=b.dataset.b;applyBase()};
document.getElementById('undo').onclick=undo;
document.getElementById('spin').onclick=e=>{autoSpin=!autoSpin;e.target.classList.toggle('on',autoSpin)};
document.getElementById('resetPaint').onclick=()=>{for(const k in paintedMap)delete paintedMap[k];applyBase();savePaint();updateCount()};
document.getElementById('resetLayout').onclick=()=>{for(let i=0;i<names.length;i++){partOffset[i]=[0,0,0];refreshPartPos(i)}saveLayout()};
const panel=document.getElementById('panel'),collapseBtn=document.getElementById('collapse');
collapseBtn.onclick=()=>{const c=panel.classList.toggle('collapsed');collapseBtn.textContent=c?tr('expand'):'▾';collapseBtn.setAttribute('aria-label',c?tr('expandAria'):tr('collapse'))};
document.getElementById('language').onclick=e=>{const b=e.target.closest('button[data-lang]');if(b)applyLanguage(b.dataset.lang)};

applyLanguage(language,false);build();loadPaint();loadLayout();
function resize(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();updateFit()}
addEventListener('resize',resize);resize();
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;let lastT=performance.now();
function frame(now){requestAnimationFrame(frame);const dt=Math.min(.05,(now-lastT)/1000);lastT=now;
 if(autoSpin&&!reduce&&!painting&&dragPart<0)yaw+=dt*.24;applyCam();renderer.render(scene,camera)}
requestAnimationFrame(frame);
</script></body></html>
