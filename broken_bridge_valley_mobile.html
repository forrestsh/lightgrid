<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#071018">
<title>断桥谷 · 手机版</title>
<style>
:root{--bg:#061019;--panel:#0b1722;--line:#284052;--text:#edf5f2;--muted:#91a5ad;--gold:#e7c66f;--green:#72e3c2;--red:#ef7777;--blue:#78bfff}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font:14px/1.45 system-ui,-apple-system,"PingFang SC",sans-serif}body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}header{height:54px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--line);background:#07111bee;position:sticky;top:0;z-index:3}.back{color:var(--muted);text-decoration:none}.brand{font:18px Georgia,serif;color:var(--gold)}main{padding:12px;max-width:620px;margin:auto}.map{position:relative;height:250px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:linear-gradient(155deg,#162b34,#09141e 62%,#071019)}svg{width:100%;height:100%}.road{fill:none;stroke:#a88659;stroke-width:8;stroke-linecap:round}.bypass{fill:none;stroke:#657c6e;stroke-width:5;stroke-dasharray:7 6}.river{fill:#204b65}.bridge{stroke:#d0a25d;stroke-width:10}.bridge.danger{stroke:var(--red);stroke-dasharray:9 4}.forest{fill:#36a783;opacity:.8}.place{fill:#f2cf76;stroke:#071019;stroke-width:3}.avatar{fill:white;stroke:var(--green);stroke-width:4;transition:transform .5s ease}.tag{font-size:10px;fill:#dce9e5}.weather{position:absolute;inset:0;pointer-events:none;opacity:0;background:repeating-linear-gradient(105deg,transparent 0 12px,#8dc8df55 13px 15px);transition:.4s}.weather.on{opacity:1}.card{margin-top:10px;padding:13px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}.eyebrow{font-size:10px;letter-spacing:.15em;color:var(--green);text-transform:uppercase}.card h1{font:22px Georgia,serif;margin:3px 0 5px}.card p{color:var(--muted);margin:0}.actions{display:grid;gap:8px;margin-top:12px}button{min-height:46px;padding:10px 12px;border:1px solid #365268;border-radius:10px;background:#101f2d;color:var(--text);font:14px inherit;text-align:left}button.primary{border-color:var(--green);color:var(--green);background:#0c2824}button:disabled{opacity:.45}.choices{display:none;gap:8px;margin-top:12px}.choices.show{display:grid}.events{margin:10px 0 0;padding-left:22px;max-height:120px;overflow:auto;color:#b7c8ca;font-size:12px}.events li{margin:4px 0}.decision{display:none;margin-top:10px;padding:10px;border-left:3px solid var(--blue);background:#0c2132;color:#c8dbe5}.decision.show{display:block}.mode{margin-left:auto;color:var(--green);font-size:10px;border:1px solid #2a5d54;padding:3px 7px;border-radius:10px}
</style>
</head>
<body>
<header><a class="back" href="lightgrid.html">← Lightgrid</a><div class="brand">断桥谷</div><span class="mode">MOBILE · 2D</span></header>
<main>
<div class="map" aria-label="断桥谷地图">
<svg viewBox="0 0 360 250" role="img" aria-label="从南岸工坊到北岸温室的断桥谷地图">
<path class="river" d="M165 0h36l-9 250h-43z"/><path class="road" d="M32 182C90 175 125 142 170 126M190 124c45-12 78-38 137-61"/><path class="bypass" d="M40 195C76 232 253 235 322 74"/><path id="bridge" class="bridge" d="M158 130l47-12"/><circle class="forest" cx="235" cy="205" r="42"/><circle class="place" cx="38" cy="182" r="11"/><circle class="place" cx="322" cy="62" r="11"/><circle class="place" cx="112" cy="218" r="9"/><circle id="avatar" class="avatar" cx="38" cy="160" r="8"/><text class="tag" x="12" y="205">南岸工坊</text><text class="tag" x="278" y="43">北岸温室</text><text class="tag" x="82" y="241">规则核心</text><text class="tag" x="210" y="206">晶体森林</text>
</svg><div id="weather" class="weather"></div></div>
<section class="card"><div class="eyebrow" id="phase">观察者序章</div><h1 id="title">一座会发生事情的地方</h1><p id="copy">南岸的材料、北岸的生命，以及连接二者的一座旧桥。手机版使用轻量地图，不依赖 WebGL。</p><div class="actions"><button id="next" class="primary">进入化身 · 领取能量晶体</button></div><div class="choices" id="bridgeChoices"><button data-bridge="inspect">停下检查旧桥裂纹</button><button data-bridge="deliver">记住风险，优先完成送货</button></div><div class="choices" id="coreChoices"><button data-core="suppress">永久降低森林生长率</button><button data-core="maintain">建设周期维护器</button><button data-core="coexist">保留生态并绕行</button></div><div id="decision" class="decision"></div></section>
<section class="card"><div class="eyebrow">behavior evidence</div><ol class="events" id="events"><li>等待第一段经历</li></ol></section>
</main>
<script>
(function(){
var state={stage:0,bridge:null,core:null,events:[]};var title=document.getElementById('title'),copy=document.getElementById('copy'),phase=document.getElementById('phase'),next=document.getElementById('next'),events=document.getElementById('events'),avatar=document.getElementById('avatar');
function log(text){state.events.push(text);events.innerHTML=state.events.map(function(e){return'<li>'+e+'</li>'}).join('')}
function move(x,y){avatar.setAttribute('cx',x);avatar.setAttribute('cy',y)}
function show(id,on){document.getElementById(id).className='choices'+(on?' show':'')}
next.onclick=function(){if(state.stage===0){state.stage=1;phase.textContent='第一次生活';title.textContent='送往北岸温室';copy.textContent='你带着能量晶体来到旧桥。裂纹暂未阻断通行，但暴雨可能扩大风险。';next.style.display='none';show('bridgeChoices',true);move(155,112);log('从南岸工坊进入化身并承担送货责任')}};
document.querySelectorAll('[data-bridge]').forEach(function(button){button.onclick=function(){state.bridge=button.getAttribute('data-bridge');show('bridgeChoices',false);move(312,48);log(state.bridge==='inspect'?'主动检查旧桥裂纹':'看到风险后优先完成温室送货');phase.textContent='规则核心';title.textContent='森林正在堵塞备用山路';copy.textContent='温室恢复供能后，晶体森林加速生长。选择一种带代价的处理方式。';show('coreChoices',true)}});
document.querySelectorAll('[data-core]').forEach(function(button){button.onclick=function(){state.core=button.getAttribute('data-core');show('coreChoices',false);var labels={suppress:'永久降低森林生长率',maintain:'建设周期维护器',coexist:'保留生态并绕行'};log(labels[state.core]);phase.textContent='第一次放手';title.textContent='角色将继承这些经历';copy.textContent=(state.bridge==='inspect'?'你关注了公共设施；':'你兑现了眼前承诺；')+'随后选择“'+labels[state.core]+'”。';next.style.display='block';next.textContent='确认放手 · 观察自主行动';next.onclick=release;try{localStorage.setItem('lightgrid.valley.mobile.v1',JSON.stringify(state))}catch(error){}}});
function release(){next.disabled=true;document.getElementById('weather').className='weather on';document.getElementById('bridge').className='bridge danger';phase.textContent='观察模式 · 不可干预';title.textContent='暴雨改变了道路';copy.textContent='角色正在根据原始行为证据评估目标。';log('玩家退出控制；暴雨扩大桥梁裂纹');setTimeout(function(){var repair=(state.bridge==='inspect'?0.8:0.4)+(state.core==='maintain'?0.15:0),care=(state.bridge==='deliver'?0.75:0.5)+(state.core==='coexist'?0.15:0);var goal=repair>care?'返回旧桥进行临时修复':'留在温室稳定能源系统';var d=document.getElementById('decision');d.className='decision show';d.innerHTML='<b>自主目标：'+goal+'</b><br>修桥 '+repair.toFixed(2)+' · 温室 '+care.toFixed(2)+'<br>证据来自你刚才的桥梁与规则核心选择。';title.textContent=goal;copy.textContent='这不是刚才下达的命令，但可以由角色继承的经历解释。';log('化身自主选择：'+goal);move(goal.indexOf('旧桥')>=0?175:312,goal.indexOf('旧桥')>=0?107:48)},700)}
})();
</script>
</body>
</html>
